version: '3.8'

services:
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: koop-backend
    restart: unless-stopped
    env_file: api/.env
    ports:
      - "3002:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: koop-frontend
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - backend
